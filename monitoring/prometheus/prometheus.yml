global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Storage settings (Prometheus 3.x style)
storage:
  tsdb:
    retention:
      time: 15d
      size: 10GB

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Your Python app (metrics endpoint)
  - job_name: 'app'
    metrics_path: /metrics
    static_configs:
      - targets: ['app-python:8000']

  # Loki metrics
  - job_name: 'loki'
    metrics_path: /metrics
    static_configs:
      - targets: ['loki:3100']

  # Grafana metrics
  - job_name: 'grafana'
    metrics_path: /metrics
    static_configs:
      - targets: ['grafana:3000']
