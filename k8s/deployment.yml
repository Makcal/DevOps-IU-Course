apiVersion: apps/v1

kind: Deployment
metadata:
  name: app-python
  labels:
    app: app-python

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: app-python

  template:
    metadata:
      labels:
        app: app-python

    spec:
      containers:
        - name: app-python
          image: makcal3000/iu-devops-app_python:new
          ports:
            - name: app-http
              containerPort: 5000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 3
