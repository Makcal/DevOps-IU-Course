apiVersion: argoproj.io/v1alpha1

kind: Application
metadata:
  name: my-python-app-dev
  namespace: argocd
  labels:
    app: my-python-app
    environment: dev

spec:
  project: default
  source:
    repoURL: https://github.com/Makcal/DevOps-IU-Course.git
    targetRevision: lab13
    path: k8s/mychart
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
