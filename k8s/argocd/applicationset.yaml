apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: my-python-app-app-set
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            namespace: dev
            valuesFile: values-dev.yaml
            replicas: 1
            autoSync: true
            selfHeal: true
            prune: true
          - env: prod
            namespace: prod
            valuesFile: values-prod.yaml
            replicas: 3
            autoSync: false
            selfHeal: false
            prune: false
  template:
    metadata:
      name: 'my-python-app-{{env}}'
      labels:
        app: my-python-app
        environment: '{{env}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/Makcal/DevOps-IU-Course.git
        targetRevision: lab13
        path: k8s/mychart
        helm:
          valueFiles:
            - '{{valuesFile}}'
          parameters:
            - name: replicaCount
              value: '{{replicas}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        {{- if eq .autoSync true}}
        automated:
          prune: {{.prune}}
          selfHeal: {{.selfHeal}}
        {{- end}}
