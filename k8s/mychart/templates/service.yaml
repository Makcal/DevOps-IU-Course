apiVersion: v1

kind: Service
metadata:
  name: {{ include "mychart.fullname" . }}-service
  labels:
    app: {{ .Chart.Name }}
    {{- include "mychart.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app: {{ .Chart.Name }}

  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: app-http
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
