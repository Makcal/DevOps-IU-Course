replicaCount: 3

image:
  repository: makcal3000/iu-devops-app_python
  tag: 0.2.0
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  containerPort: 5000
  nodePort: 30080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 3
  failureThreshold: 3

secrets:
  username: admin
  password: changeme

environment: "development"
logLevel: "info"
debugMode: true

# ConfigMap settings
configMap:
  enabled: true
  mountPath: /config

# Persistence settings
persistence:
  enabled: true
  size: 1Ki
  storageClass: ""  # Use default storage class
  mountPath: /data
  accessMode: ReadWriteOnce
