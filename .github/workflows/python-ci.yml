name: Python tests

on: [push, pull_request]

jobs:
  test:
    name: Linting and Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - name: Install deps
        run: pip install -r requirments.txt -r requirments-dev.txt
      - name: Linting
        run: flake8 --radon-max-cc=10 src main.py
      - name: Testing
        run: pytest -v --cov=main --cov=src

  docker:  
    name: Build & Push Docker Image  
    runs-on: ubuntu-latest  
    needs: test  
    if: github.ref == 'refs/heads/lab03'
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: 
            - ${{ secrets.DOCKERHUB_USERNAME }}/ui-devops-python-app:0.1.0
            - ${{ secrets.DOCKERHUB_USERNAME }}/ui-devops-python-app:latest
