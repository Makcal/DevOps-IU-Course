name: Ansible Deployment

on:
  push:
    branches: [main, master, lab06]
    paths:
      - 'ansible/**'
      - '!ansible/docs/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'ansible/**'
      - '!ansible/docs/**'
      - '.github/workflows/ansible-deploy.yml'

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ansible ansible-lint

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/provision.yml playbooks/deploy.yml playbooks/site.yml

  deploy:
    name: Deploy Application
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push'
    environment: AnsibleSSH
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Write Vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass

      - name: Deploy with Ansible
        run: |
          cd ansible
          # Создаем временный файл инвентаря
          echo "[webservers]" > ci_hosts
          echo "${{ secrets.VM_HOST }} ansible_user=${{ secrets.VM_USER }}" >> ci_hosts
          ansible-playbook -i ci_hosts playbooks/deploy_all.yml \
            --vault-password-file /tmp/vault_pass
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Clean up vault password
        if: always()
        run: rm -f /tmp/vault_pass

      - name: Verify Deployment
        run: |
          sleep 10
          curl -f http://${{ secrets.VM_HOST }}:8000/health || exit 1
          curl -f http://${{ secrets.VM_HOST }}:8001/health || exit 1
