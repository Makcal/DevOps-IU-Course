---
- name: Deploy All Applications
  hosts: webservers
  become: true
  gather_facts: yes

  tasks:
    - name: Deploy Python app
      include_role:
        name: web_app
      vars:
        app_name: devops-python
        docker_image: makcal3000/iu-devops-app_python
        docker_tag: latest
        app_port: 8000
        app_internal_port: 8000
        compose_project_dir: "/opt/devops-python"

    - name: Deploy Rust app
      include_role:
        name: web_app
      vars:
        app_name: devops-rust
        docker_image: makcal3000/iu-devops-app_rust
        docker_tag: latest
        app_port: 8001
        app_internal_port: 8080
        compose_project_dir: "/opt/devops-rust"
