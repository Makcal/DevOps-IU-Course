---
# Docker installation block with error handling
- name: Install Docker
  block:
    - name: Remove old Docker packages
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        update_cache: yes

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      notify:
        - restart docker
        - restart containerd

    - name: Install Python Docker module
      apt:
        name:
          - python3-docker
        state: present

  rescue:
    - name: Wait before retrying GPG key addition
      pause:
        seconds: 10

    - name: Retry Docker GPG key addition
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Retry Docker packages installation
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

  always:
    - name: Ensure Docker service is enabled and started
      systemd:
        name: docker
        state: started
        enabled: yes
      ignore_errors: yes

  become: true
  tags:
    - docker
    - docker_install

# Docker configuration block
- name: Configure Docker
  block:
    - name: Ensure Docker is running and enabled
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes
      notify: restart docker

    - name: Test Docker installation
      command: docker --version
      register: docker_version_result
      changed_when: false

    - name: Display Docker version
      debug:
        msg: "Docker installed: {{ docker_version_result.stdout }}"

  become: true
  tags:
    - docker
    - docker_config
