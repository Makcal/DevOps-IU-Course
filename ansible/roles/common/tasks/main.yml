---
# Package installation block with error handling
- name: Install system packages
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Retry apt cache update with --fix-missing on failure
      apt:
        update_cache: yes
        cache_valid_time: 0
      ignore_errors: yes

    - name: Install common packages (retry after fix)
      apt:
        name: "{{ common_packages }}"
        state: present

  always:
    - name: Log package installation completion
      copy:
        content: "common role package installation completed at {{ ansible_date_time.iso8601 }}\n"
        dest: /tmp/common_packages_done.log
        mode: '0644'

  become: true
  tags:
    - packages
    - common

# Timezone configuration
- name: Set timezone
  timezone:
    name: "{{ timezone }}"
  become: yes
  when: timezone is defined
  register: timezone_result
  tags:
    - system
    - common

# Directory creation and system state block
- name: Manage common directories and system state
  block:
    - name: Create common directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/app
        - /var/log/app

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Display reboot notice if needed
      debug:
        msg: "System reboot required due to kernel updates"
      when: reboot_required.stat.exists

  become: true
  tags:
    - directories
    - common
