---
# Application identity
app_name: devops-app
docker_image: makcal3000/iu-devops-app_python
docker_tag: latest

# Port mapping
app_port: 8000          # host port
app_internal_port: 8000 # container port

# Docker Compose configuration
docker_compose_version: "3.8"
compose_project_dir: "/opt/{{ app_name }}"

# Health check settings
health_check_endpoint: "/health"
health_check_timeout: 30
health_check_delay: 5

# Wipe logic control
# Set to true to remove the application completely before (re)deployment
# Usage: ansible-playbook deploy.yml -e "web_app_wipe=true" --tags web_app_wipe
web_app_wipe: false
