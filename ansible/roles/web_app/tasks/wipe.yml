---
# Wipe task: stop containers, remove compose file and application directory
# Requires: web_app_wipe=true variable AND --tags web_app_wipe
- name: Wipe web application
  block:
    - name: Stop and remove containers with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: absent
        remove_volumes: true
      ignore_errors: true

    - name: Remove docker-compose file
      file:
        path: "{{ compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: Remove application directory
      file:
        path: "{{ compose_project_dir }}"
        state: absent

    - name: Log wipe completion
      debug:
        msg: "Application {{ app_name }} wiped successfully"

  when: web_app_wipe | bool
  become: true
  tags:
    - web_app_wipe
