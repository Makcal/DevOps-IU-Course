---
# Wipe logic - removes an existing deployment cleanly.
# Double-gated: requires BOTH web_app_wipe=true variable AND --tags web_app_wipe.
# This prevents accidental removal during normal deployments.
- name: Wipe web application
  block:
    - name: Stop and remove containers via Docker Compose
      command: docker compose -f "{{ compose_project_dir }}/docker-compose.yml" down --remove-orphans
      args:
        chdir: "{{ compose_project_dir }}"
      changed_when: true

    - name: Remove application directory
      file:
        path: "{{ compose_project_dir }}"
        state: absent

    - name: Log wipe completion
      debug:
        msg: "Application {{ app_name }} wiped successfully from {{ compose_project_dir }}"

  when: web_app_wipe | bool
  become: true
  ignore_errors: yes
  tags:
    - web_app_wipe
