---
# Wipe logic runs first (when explicitly requested via variable + tag)
- name: Include wipe tasks
  include_tasks: wipe.yml
  tags:
    - web_app_wipe
    - app_deploy
    - compose

# Application deployment using Docker Compose
- name: Deploy application with Docker Compose
  block:
    - name: Create application directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: '0755'

    - name: Template docker-compose file
      template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: '0644'
      notify: restart app

    - name: Deploy with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always

    - name: Wait for application to be ready
      wait_for:
        port: "{{ app_port }}"
        host: "{{ ansible_host }}"
        delay: 5
        timeout: 30
      become: false
      delegate_to: localhost

    - name: Display deployment status
      debug:
        msg:
          - "Application: {{ app_name }}"
          - "Image: {{ docker_image }}:{{ docker_tag }}"
          - "URL: http://{{ ansible_host }}:{{ app_port }}"

  rescue:
    - name: Handle deployment failure
      debug:
        msg: "Deployment of {{ app_name }} failed. Check docker-compose logs."

  become: true
  tags:
    - app_deploy
    - compose
