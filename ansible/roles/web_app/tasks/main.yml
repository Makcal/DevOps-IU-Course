---
# Wipe logic runs first (only when explicitly requested with variable + tag)
- name: Include wipe tasks
  include_tasks: wipe.yml
  tags:
    - always

# Docker Compose application deployment
- name: Deploy application with Docker Compose
  block:
    - name: Create application directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: '0755'

    - name: Template docker-compose.yml
      template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Pull latest image
      command: docker compose -f "{{ compose_project_dir }}/docker-compose.yml" pull
      args:
        chdir: "{{ compose_project_dir }}"
      changed_when: true

    - name: Deploy with Docker Compose
      command: docker compose -f "{{ compose_project_dir }}/docker-compose.yml" up -d --remove-orphans
      args:
        chdir: "{{ compose_project_dir }}"
      register: compose_result
      changed_when: true

    - name: Wait for application to be ready
      wait_for:
        port: "{{ app_port }}"
        host: "{{ ansible_host }}"
        delay: "{{ health_check_delay }}"
        timeout: "{{ health_check_timeout }}"
      become: no
      delegate_to: localhost

    - name: Test health endpoint
      uri:
        url: "http://{{ ansible_host }}:{{ app_port }}{{ health_check_endpoint }}"
        method: GET
        status_code: 200
      register: health_result
      until: health_result.status == 200
      retries: 5
      delay: 2
      become: no
      delegate_to: localhost

    - name: Display application status
      debug:
        msg:
          - "Application: {{ app_name }}"
          - "Image: {{ docker_image }}:{{ docker_tag }}"
          - "Port: {{ app_port }} -> {{ app_internal_port }}"
          - "Compose dir: {{ compose_project_dir }}"
          - "Health: {{ health_result.status }}"

  rescue:
    - name: Log deployment failure
      debug:
        msg: "Deployment of {{ app_name }} failed. Check Docker Compose logs in {{ compose_project_dir }}."

  become: true
  tags:
    - app_deploy
    - compose
